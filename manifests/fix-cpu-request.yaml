# Lowers the kserve-container CPU request so the predictor pod schedules
# on nodes with limited headroom. NIM/vLLM is GPU-bound; CPU bursting to
# the 1-core limit is still allowed.
#
# Apply with:
#   oc patch inferenceservice llama-31-nemotron-nano-4b -n nvidia-nim \
#     --type=merge --patch-file fix-cpu-request.yaml
spec:
  predictor:
    model:
      resources:
        requests:
          cpu: "200m"
