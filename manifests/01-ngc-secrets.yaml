# NGC secrets — do NOT apply this file with real keys; create secrets imperatively (see README Step 2).
#
# Two secrets are required:
#
# 1. nvidia-nim-secrets  — injects NGC_API_KEY as an env var into the NIM container at runtime.
#
#    oc create secret generic nvidia-nim-secrets \
#      --from-literal=NGC_API_KEY="<your-key>" \
#      -n nvidia-nim
#
# 2. ngc-secret  — imagePullSecret used by the ServingRuntime to pull the NIM image from nvcr.io.
#
#    oc create secret docker-registry ngc-secret \
#      --docker-server=nvcr.io \
#      --docker-username='$oauthtoken' \
#      --docker-password="<your-key>" \
#      -n nvidia-nim
#
# Template below is for reference only (nvidia-nim-secrets). Replace the placeholder before applying,
# or use the imperative command above instead.
apiVersion: v1
kind: Secret
metadata:
  name: nvidia-nim-secrets
  namespace: nvidia-nim
type: Opaque
stringData:
  NGC_API_KEY: "<YOUR_NGC_API_KEY>"
