# NGC API key consumed by the NIM container at runtime (env var NGC_API_KEY).
# Generate at: https://org.ngc.nvidia.com/setup/api-keys
# Use a Personal API Key (not an org key) for best compatibility.
apiVersion: v1
kind: Secret
metadata:
  name: nvidia-nim-secrets
  namespace: nvidia-nim
type: Opaque
stringData:
  NGC_API_KEY: "<YOUR_NGC_API_KEY>"
---
# Docker pull secret so the node can pull images from nvcr.io.
# Create with:
#   oc create secret docker-registry ngc-secret \
#     --docker-server=nvcr.io \
#     --docker-username='$oauthtoken' \
#     --docker-password='<YOUR_NGC_API_KEY>' \
#     -n nvidia-nim
#
# The YAML below is a template — fill in the base64-encoded dockerconfigjson:
#   echo -n '{"auths":{"nvcr.io":{"username":"$oauthtoken","password":"<NGC_API_KEY>"}}}' | base64 -w0
apiVersion: v1
kind: Secret
metadata:
  name: ngc-secret
  namespace: nvidia-nim
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "<BASE64_ENCODED_DOCKER_CONFIG>"
